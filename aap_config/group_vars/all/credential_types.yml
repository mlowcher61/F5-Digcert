---
# Custom credential type for the DigiCert CertCentral REST API.
# Mirrors ../../credential_types/digicert.yml.
controller_credential_types:
  - name: DigiCert CertCentral
    description: API credentials for DigiCert CertCentral REST API
    kind: cloud
    inputs:
      fields:
        - id: digicert_api_key
          type: string
          label: DigiCert API Key
          secret: true
        - id: digicert_org_id
          type: string
          label: DigiCert Organization ID
      required:
        - digicert_api_key
        - digicert_org_id
    injectors:
      extra_vars:
        digicert_api_key: "{{ digicert_api_key }}"
        digicert_org_id: "{{ digicert_org_id }}"
    state: present
