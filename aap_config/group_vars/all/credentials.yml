---
# BIG-IP uses the AAP-native Network credential type; DigiCert uses the
# custom type defined in credential_types.yml. Secrets come from
# example_vault.yml (copy to vault.yml, fill in, and ansible-vault encrypt).
controller_credentials:
  - name: F5 BIG-IP Admin
    description: Admin account used by f5networks.f5_modules
    organization: F5-Digicert
    credential_type: Network
    inputs:
      username: "{{ vault_bigip_username }}"
      password: "{{ vault_bigip_password }}"
    state: present

  - name: DigiCert CertCentral API
    description: DigiCert REST API key and org ID
    organization: F5-Digicert
    credential_type: DigiCert CertCentral
    inputs:
      digicert_api_key: "{{ vault_digicert_api_key }}"
      digicert_org_id: "{{ vault_digicert_org_id }}"
    state: present
