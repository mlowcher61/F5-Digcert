---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    dry_run: true
    bigip_username: testuser
    bigip_password: testpass
    digicert_api_key: test-api-key
    digicert_org_id: 12345
    state_dir: /tmp/f5_cert_renewal_state
    renewal_threshold_days: 30

  roles:
    - role: f5_digicert_cert_renewal
