---
- name: Load existing state file for {{ inventory_hostname }}
  ansible.builtin.set_fact:
    existing_state: "{{ lookup('file', state_dir + '/' + inventory_hostname + '.yml') | from_yaml }}"
  ignore_errors: true

- name: Default existing state to empty when no state file found
  ansible.builtin.set_fact:
    existing_state: { profiles: [] }
  when: existing_state is not defined or existing_state is failed

- name: Query BIG-IP SSL certificate inventory
  f5networks.f5_modules.bigip_device_info:
    gather_subset:
      - ssl-certs
    provider: "{{ bigip_provider }}"
  register: bigip_device_facts

- name: Build expiring profiles list
  ansible.builtin.set_fact:
    expiring_profiles: >-
      {%- set result = [] -%}
      {%- set today = ansible_date_time.epoch | int -%}
      {%- for profile in bigip_ssl_profiles -%}
        {%- set cert_data = bigip_device_facts.ssl_certs
            | selectattr('name', 'equalto', profile.cert_name)
            | selectattr('partition', 'equalto', profile.partition | default(bigip_partition))
            | list -%}
        {%- if cert_data | length > 0 -%}
          {%- set cert = cert_data[0] -%}
          {%- set days_remaining = ((cert.expiration_date | int - today) / 86400) | int -%}
          {%- set state_record = existing_state.profiles
              | selectattr('profile_name', 'equalto', profile.profile_name)
              | list -%}
          {%- set prior_serial = state_record[0].current_serial if state_record | length > 0 else '' -%}
          {%- if days_remaining <= (renewal_threshold_days | int) and cert.serial_number != prior_serial -%}
            {%- set _ = result.append({
                'profile_name': profile.profile_name,
                'cert_name': profile.cert_name,
                'key_name': profile.key_name,
                'partition': profile.partition | default(bigip_partition),
                'cert_cn': cert.subject | regex_replace('^.*CN=([^,/]+).*$', '\\1'),
                'cert_serial': cert.serial_number,
                'expiry_str': cert.expiration_string,
                'days_remaining': days_remaining
            }) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Log detection results
  ansible.builtin.debug:
    msg: >-
      {
        "timestamp": "{{ ansible_date_time.iso8601 }}",
        "device": "{{ inventory_hostname }}",
        "event": "detection_complete",
        "expiring_count": {{ expiring_profiles | length }},
        "profiles": {{ expiring_profiles | map(attribute='profile_name') | list | to_json }}
      }

- name: DRY RUN - Report certificates that would be renewed
  ansible.builtin.debug:
    msg: >-
      DRY RUN: Would renew {{ item.cert_name }} on profile {{ item.profile_name }}
      (expires {{ item.expiry_str }}, {{ item.days_remaining }} days remaining)
  loop: "{{ expiring_profiles }}"
  when: dry_run | bool

- name: DRY RUN - Set renewal_required to false
  ansible.builtin.set_fact:
    renewal_required: false
  when: dry_run | bool

- name: DRY RUN - Build skipped state records
  ansible.builtin.set_fact:
    renewal_state_records: >-
      {%- set result = [] -%}
      {%- for profile in bigip_ssl_profiles -%}
        {%- set _ = result.append({
            'profile_name': profile.profile_name,
            'cert_name': profile.cert_name,
            'previous_serial': '',
            'current_serial': null,
            'order_id': null,
            'status': 'skipped',
            'last_checked_at': ansible_date_time.iso8601,
            'renewed_at': null,
            'failure_reason': 'dry_run'
        }) -%}
      {%- endfor -%}
      {{ result }}
  when: dry_run | bool
