---
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: "--pre"

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/ee-minimal-rhel9:latest

dependencies:
  galaxy:
    collections:
      - name: community.crypto
        version: ">=2.0.0"
      - name: f5networks.f5_modules
        version: ">=1.0.0"
      - name: ansible.utils
        version: ">=2.0.0"
  python:
    - pyOpenSSL
    - cryptography
  system: []
