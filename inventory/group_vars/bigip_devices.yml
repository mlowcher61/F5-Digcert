---
# BIG-IP credentials — injected by the F5 BIG-IP custom credential type in AAP
# (bigip_username, bigip_password)
bigip_port: 443
bigip_validate_certs: true
bigip_partition: Common

# DigiCert credentials — injected by the DigiCert custom credential type in AAP
# (digicert_api_key, digicert_org_id)

# Renewal configuration
renewal_threshold_days: 30
digicert_validity_years: 1
key_size: 4096
state_dir: "{{ playbook_dir }}/state"
max_retries: 3
retry_delay_seconds: 10
sequential_devices: true
dry_run: false
